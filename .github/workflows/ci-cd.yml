name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # BUILD + TEST (backend) ----------
  backend-build-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        working-directory: server
        run: ./mvnw -B -ntp compile

      - name: Test
        working-directory: server
        run: ./mvnw -B -ntp test

  # BUILD + TEST (frontend) ----------
  frontend-build-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint --if-present

      # - name: Test
      #   working-directory: client
      ##   run: npm run test --if-present

      - name: Build
        working-directory: client
        run: npm run build

  # ---------- DOCKER BUILD (validation only) ----------
  # Confirms both Dockerfiles still build cleanly. This does NOT push or deploy
  # anything — Render builds server/Dockerfile itself, and Vercel builds
  # client/ directly (it ignores client/Dockerfile entirely). This job exists
  # purely so a broken Dockerfile can't reach main unnoticed.
  docker-build-validate:
    needs: [backend-build-test, frontend-build-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate backend Docker image builds
        run: docker build -f server/Dockerfile -t cashpilot-backend:ci server

      - name: Validate frontend Docker image builds
        run: docker build -f client/Dockerfile -t cashpilot-frontend:ci client

  # ---------- POST-DEPLOY SMOKE TEST ----------
  # Runs after a merge to main. Render/Vercel are already redeploying on their
  # own — this just polls until the new versions are actually live and healthy.
  post-deploy-smoke-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend health check
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://cashpilot-2l6p.onrender.com/actuator/health || true)
            if [ "$status" -eq 200 ]; then
              echo "Backend healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: backend not ready yet (status $status), retrying in 15s..."
            sleep 15
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Check frontend availability
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://cash-pilot-ten.vercel.app)
          if [ "$status" -ne 200 ]; then
            echo "Frontend check failed with status $status"
            exit 1
          fi
          echo "Frontend is up"